name: Auto-merge
# Free-tier-friendly auto-merge: when CI finishes successfully on a PR, find that
# PR and squash-merge it. No branch-protection / GitHub Pro required — the merge
# step only runs after CI's `success` conclusion, so CI is the gate.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
permissions:
  contents: write
  pull-requests: write
jobs:
  automerge:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Squash-merge the PR that passed CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          PR=$(gh api "repos/$REPO/commits/$SHA/pulls" \
                 -H "Accept: application/vnd.github+json" --jq '.[0].number')
          if [ -z "$PR" ] || [ "$PR" = "null" ]; then
            echo "No open PR for $SHA — nothing to merge."; exit 0
          fi
          echo "CI passed for PR #$PR — squash-merging."
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
