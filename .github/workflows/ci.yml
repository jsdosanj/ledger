name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps (if a package.json exists)
        run: if [ -f package.json ]; then npm ci || npm install; fi
      - name: Typecheck / build / test (if scripts exist)
        run: |
          if [ -f package.json ]; then
            npm run typecheck --if-present
            npm run typecheck:ds --if-present
            npm run build --if-present
            npm test --if-present
          fi
      - name: Syntax-check all JS
        run: |
          find . -path ./node_modules -prune -o -type f \( -name '*.js' -o -name '*.mjs' \) -print \
            | while read -r f; do node --check "$f" || exit 1; done
      - name: Product verify harness (if present)
        run: |
          if [ -f verify.mjs ]; then node verify.mjs; fi
          if [ -f scripts/verify.js ]; then node scripts/verify.js; fi
          if [ -f scripts/verify.mjs ]; then node scripts/verify.mjs; fi
